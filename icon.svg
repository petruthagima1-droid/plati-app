<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#1c2b1f"/>

  <!-- Banknote stack -->
  <rect x="14" y="46" width="62" height="34" rx="4" fill="#f4f0e6" opacity="0.5"/>
  <rect x="18" y="40" width="62" height="34" rx="4" fill="#f4f0e6" opacity="0.75"/>
  <rect x="22" y="34" width="62" height="34" rx="4" fill="#f4f0e6"/>

  <!-- Banknote details on top note -->
  <rect x="30" y="42" width="16" height="3" rx="1.5" fill="#5a6b5d"/>
  <rect x="30" y="58" width="22" height="3" rx="1.5" fill="#5a6b5d"/>

  <!-- Coin -->
  <circle cx="68" cy="51" r="15" fill="#b5562f"/>
  <circle cx="68" cy="51" r="15" fill="none" stroke="#f4f0e6" stroke-width="1.5" opacity="0.5"/>
  <text x="68" y="57" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#f4f0e6" text-anchor="middle">L</text>

  <!-- Checkmark badge -->
  <circle cx="78" cy="78" r="14" fill="#4f7a52"/>
  <path d="M71 78 L76 83 L86 71" fill="none" stroke="#f4f0e6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
